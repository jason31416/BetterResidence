block:
  all:
    name: "target-group.block.all"
    priority: 1
    targets:
      - ".*"
  container:
    name: "target-group.block.container"
    priority: 2
    targets:
      - "chest"
      - "trapped_chest"
      - "ender_chest"
      - "barrel"
      - ".*_shulker_box"
  doors:
    name: "target-group.block.doors"
    priority: 2
    targets:
      - ".*_door"
      - ".*_trapdoor"
      - ".*_fence_gate"
  signs:
    name: "target-group.block.signs"
    priority: 3
    targets:
      - ".*_sign"
      - ".*_wall_sign"
      - ".*_hanging_sign"
      - ".*_wall_hanging_sign"
  redstone:
    name: "target-group.block.redstone"
    priority: 2
    targets:
      - "redstone_wire"
      - "redstone_torch"
      - "redstone_wall_torch"
      - "repeater"
      - "comparator"
      - "observer"
      - "piston"
      - "sticky_piston"
      - "dispenser"
      - "dropper"
      - "hopper"
      - "lever"
      - ".*_button"
      - ".*_pressure_plate"
      - "light_weighted_pressure_plate"
      - "heavy_weighted_pressure_plate"
