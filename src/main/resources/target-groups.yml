      - "tripwire_hook"
      - "crafter"
      - "copper_bulb"
      - ".*_copper_bulb"
  workstations:
    name: "target-group.block.workstations"
    priority: 2
    targets:
      - "crafting_table"
      - "furnace"
      - "blast_furnace"
      - "smoker"
      - "brewing_stand"
      - "cartography_table"
