# BetterResidence Configuration
version: "1.0"

# Language setting
# Place language files in lang/ folder (e.g., lang/en-us.yml)
lang: "zh-cn"

# Message Color Theme
# Refer to the theme set in lang/theme.yml
theme: "default"

particle:
  range: 16

claim:
  list-page-size: 8
  info-group-hover-limit: 12
  info-member-hover-limit: 12
  info-subclaim-hover-limit: 12

  # Configured groups are global templates. Visitor is not configured here: it means no group
  # record and always has weight 0. "claim.group.everyone" is only a /res set alias for -1000.
  # Group weights must be between -1000 and 1000. Owner must be exactly 1000.
  groups:
    owner:
      name: "lang:claim.group.owner"
      weight: 1000
    trusted:
      name: "lang:claim.group.trusted"
      weight: 900
    blacklisted:
      name: "lang:claim.group.blacklisted"
      weight: -100

  default-permissions:
    trusted-allow-all: # The key here doesn't matter. By default, trusted can have permission to build/place/etc.
      permission: "*:all"
      weight: 900
    owner-only-admin: # By default, only owner should be able to grant/revoke permission and edit claim settings.
      permission: "admin"
      weight: 1000
