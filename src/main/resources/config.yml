# Language setting
# Place language files in lang/ folder (e.g., lang/en-us.yml)
lang: "zh-cn"

# Message Color Theme. Refer to the themes in lang/theme.yml.
theme: "default"

claim:
  # Regex that claim names must fully match.
  name-regex: "[A-Za-z0-9_-]{1,64}"

  # Maximum top-level claims each player can own. Use -1 for no limit.
  # The plugin can handle millions of claims with reasonable performance, so you don't have to limit this for performance.
  max-claims-per-player: -1
  # Maximum direct subclaims each claim can have. Use -1 for no limit.
  max-subclaims-per-claim: -1
  # Maximum subclaim depth. Top-level claims are depth 0. Use -1 for no limit.
  max-subclaim-depth: 3

  create:
    # Material used to select two claim corners with left/right click.
    selection-tool: "WOODEN_HOE"
    # The price per block for claims.
    price-per-block: 1.0

  # Configured groups are global templates. Each claim might have their own groups in addition to these.
  # Group weights must be between -1000 and 1000. Owner must be exactly 1000.
  # `owner` and `trusted` must exist.
  groups:
    owner:
      name: "lang:claim.group.owner"
      weight: 1000
    trusted:
      name: "lang:claim.group.trusted"
      weight: 800

    # You can freely add/remove entries here.

    admin:
      name: "lang:claim.group.admin" # Name can either be directly written here, or can be a language entry with prefix lang:
      weight: 900
    blacklisted:
      name: "lang:claim.group.blacklisted"
      weight: -100

  default-permissions:
    # Order doesn't matter.
    # All permissions have a default of 1000.
    trusted-allow-all: # The key here doesn't matter. By default, trusted can have permission to build/place/etc.
      permission: "*:all"
      weight: 800 # The minimum weight a group must have to have this permission
    admin: # This specific entry will override the previous one
      permission: "admin"
      weight: 900
    owner-only-deletion:
      permission: "admin.removeclaim"
      weight: 1000
    allow-visitor-entry:
      permission: "enter"
      weight: 0
    allow-visitor-use:
      permission: "use"
      weight: 0
    allow-visitor-fly:
      permission: "fly"
      weight: 0
    allow-visitor-dropitem-throw-pickup:
      permission: "dropitem"
      weight: 0

  teleport:
    # Seconds players must stand still before /res tp teleports them. Use 0 to disable warmup.
    warmup-seconds: 3

# Visualizer settings control particle-based area previews.
visualizer:
  # [Performance] Maximum distance from a player where visualizer particles are rendered.
  range: 16

  # Visualizer colors for the claim creation selection preview.
  # Colors use "red,green,blue" RGB values from 0 to 255.
  create-claim:
    # Selection is valid and /res create can create the claim.
    available:
      frame-color: "80,220,120"
      side-color: "120,240,150"
    # Selection is complete but blocked by non-conflict limits, such as money or claim count.
    limited:
      frame-color: "230,200,60"
      side-color: "245,220,100"
    # Selection overlaps an existing claim.
    conflict:
      frame-color: "230,70,70"
      side-color: "245,110,100"

  # Automatically display nearby claims while the player is holding the claim selection tool.
  nearby-claims:
    enabled: true
    # [Performance] Search radius used for the database bounds query. This should usually be slightly larger than visualizer.range.
    query-range: 48
    # [Performance] Minimum time between nearby-claim database refreshes per player.
    refresh-millis: 2000
    # [Performance] Player movement required before a nearby-claim refresh can happen before refresh-millis expires.
    refresh-distance: 8.0
    # [Performance] Hard cap for how many claim areas one player can auto-display at once.
    max-areas-per-player: 32

    frame-color: "90,170,255"
    side-color: "120,190,255"

  # Briefly display claim borders when a player enters or leaves a claim.
  claim-flash:
    enabled: true
    # How long should the particles last
    duration-millis: 1000
    frame-color: "90,170,255"
    side-color: "120,190,255"

# BetterResidence Configuration version, do not edit.
version: "1.0"
