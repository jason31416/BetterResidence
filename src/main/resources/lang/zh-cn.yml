# BetterResidence Chinese Language File

# Color variables:
# <content> normal content
# <highlight> important variables, titles, name of the plugin, etc.
# Error structure:
# <error-primary>错误: <error-content>Actual message goes here, with <error-highlight>important details <error-content>here

command:
  no-permission: "<error-primary>错误: <error-content>您没有权限执行该命令"
  player-only: "<error-primary>错误: <error-content>该命令只能被玩家执行"
  not-in-claim: "<error-primary>错误: <error-content>您不在任何领地内"
  no-claim-admin: "<error-primary>错误: <error-content>您没有权限管理该领地"
  group-not-found: "<error-primary>错误: <error-content>找不到名为 <error-highlight>%group% <error-content>的权限组"
  cannot-trust-owner: "<error-primary>错误: <error-content>不能修改领地主人的权限组"
  permission-not-found: "<error-primary>错误: <error-content>未知权限 <error-highlight>%permission%"
  permission-target-unsupported: "<error-primary>错误: <error-content>权限 <error-highlight>%permission% <error-content>不支持目标后缀"
  claim-not-found: "<error-primary>错误: <error-content>找不到领地 <error-highlight>%claim%"
  info-player-only: "<error-primary>错误: <error-content>控制台需要指定要查询的领地"
  list-player-only: "<error-primary>错误: <error-content>控制台需要指定玩家，例如 <error-highlight>/res list <玩家>"
  no-claims: "<content>没有找到 <highlight>%player% <content>拥有的领地"
  trust-success: "<content>已将 <highlight>%player% <content>加入领地 <highlight>%claim% <content>的 <highlight>%group% <content>权限组"
  untrust-success: "<content>已将 <highlight>%player% <content>从领地 <highlight>%claim% <content>的权限组中移除"
  set-permission-success: "<content>已将领地 <highlight>%claim% <content>中权限 <highlight>%permission% <content>的最低权限组设置为 <highlight>%group%"
  flag-usage: "<error-primary>错误: <error-content>正确用法: <error-highlight>/res flag <标志> [值]"
  flag-not-found: "<error-primary>错误: <error-content>未知领地标志 <error-highlight>%flag%"
  flag-invalid-value: "<error-primary>错误: <error-content>领地标志 <error-highlight>%flag% <error-content>不接受值 <error-highlight>%value%"
  flag-get-success: "<content>领地 <highlight>%claim% <content>的标志 <highlight>%flag% <content>当前值为 <highlight>%value%"
  flag-set-success: "<content>已将领地 <highlight>%claim% <content>的标志 <highlight>%flag% <content>设置为 <highlight>%value%"
  flaglist-message:
    - "<dark_gray>======== <highlight>%claim% <muted>- 已存储标志 <dark_gray>========"
    - "<content>共 <highlight>%count% <content>个已存储标志"
  flaglist-entry: "<muted>- <highlight>%flag% <muted>= <content>%value%"
  flaglist-empty: "<muted>无已存储标志"

  reload-success: "<highlight>BetterResidence <content>已重新加载"
  reload-failed: "<error-primary>错误: <error-content>BetterResidence 重新加载失败: <error-highlight>%error%"

  admin-help: "<content>BetterResidence 管理命令: <highlight>/res admin fsck"
  fsck-started: "<content>已开始检查 BetterResidence 数据完整性..."
  fsck-check-completed: "<content>检查项 <highlight>%check% <content>已完成: %status% <muted>(异常数据行: <highlight>%rows%<muted>)"
  fsck-check-status-passed: "<green>通过"
  fsck-check-status-failed: "<red>失败"
  fsck-success: "<content>数据完整性检查完成，未发现失败的检查项"
  fsck-failed: "<error-primary>警告: <error-content>数据完整性检查完成，<error-highlight>%failed% <error-content>个检查项失败。报告: <error-highlight>%report%"
  fsck-report-unavailable: "报告写入失败"

  create-usage: "<error-primary>错误: <error-content>正确用法: <error-highlight>/res create <领地名>"
  create-no-selection: "<error-primary>错误: <error-content>请先用选区工具选择两个角落"
  create-different-worlds: "<error-primary>错误: <error-content>两个选区点必须在同一个世界"
  create-overlap: "<error-primary>错误: <error-content>选区与领地 <error-highlight>%conflict% <error-content>冲突"
  create-partial-overlap: "<error-primary>错误: <error-content>选区只部分位于已有领地内，冲突领地: <error-highlight>%conflict%"
  create-no-parent-admin: "<error-primary>错误: <error-content>您没有权限在领地 <error-highlight>%parent% <error-content>内创建子领地"
  create-max-claims: "<error-primary>错误: <error-content>你的领地数量已达到上限 <error-highlight>%max%"
  create-max-subclaims: "<error-primary>错误: <error-content>领地 <error-highlight>%parent% <error-content>的直接子领地数量已达到上限 <error-highlight>%max-subclaims%"
  create-max-subclaim-depth: "<error-primary>错误: <error-content>子领地深度已达到上限 <error-highlight>%max-depth%"
  create-not-enough-money: "<error-primary>错误: <error-content>金币不足，创建该领地需要 <error-highlight>%price%"
  create-subclaim-overlap: "<error-primary>错误: <error-content>子领地只能与父级领地链重叠，当前选区冲突领地: <error-highlight>%conflict%"
  create-invalid-name: "<error-primary>错误: <error-content>领地名 <error-highlight>%claim% <error-content>不合法，必须匹配正则: <error-highlight>%regex%"
  create-name-exists: "<error-primary>错误: <error-content>领地 <error-highlight>%claim% <error-content>已存在"
  create-unavailable: "<error-primary>错误: <error-content>当前选区不能创建领地"
  create-success: "<content>已创建领地 <highlight>%claim%<content>，大小 <highlight>%size% <content>方块，花费 <highlight>%price%"
  create-subclaim-success: "<content>已在领地 <highlight>%parent% <content>内创建子领地 <highlight>%claim%<content>，大小 <highlight>%size% <content>方块"

  remove-no-pending: "<error-primary>错误: <error-content>没有待确认的删除操作，请先输入 <error-highlight>/res remove"
  remove-expired: "<error-primary>错误: <error-content>删除确认已过期，请重新输入 <error-highlight>/res remove"
  remove-success: "<content>已删除领地 <highlight>%claim%<content>，<highlight>%promoted-count% <content>个直接子领地已升级到 <highlight>%parent%"
  remove-confirm-message:
    - "<dark_gray>======== <error-highlight>删除领地确认 <dark_gray>========"
    - "<muted>领地: <highlight>%claim% <dark_gray>(%short-uuid%)"
    - "<muted>区域: <highlight>%area-summary%"
    - "<muted>直接子领地: <highlight>%subclaim-count% <muted>个"
    - "<error-content>此操作不可撤销。请在 <error-highlight>%seconds% <error-content>秒内确认。"
    - "%confirm%"
  remove-confirm-button: "<hover:show_text:'确认删除该领地，此操作不可撤销'><click:run_command:%command%><error-highlight>[确认删除]</click></hover>"

  area-usage: "<error-primary>错误: <error-content>正确用法: <error-highlight>/res area <add|remove|list>"
  area-add-usage: "<error-primary>错误: <error-content>正确用法: <error-highlight>/res area add [领地]"
  area-add-no-selection: "<error-primary>错误: <error-content>请先用选区工具选择两个角落"
  area-add-different-worlds: "<error-primary>错误: <error-content>两个选区点必须在同一个世界"
  area-add-outside-parent: "<error-primary>错误: <error-content>子领地区域必须完全位于父领地范围内"
  area-add-overlap: "<error-primary>错误: <error-content>选区与领地 <error-highlight>%conflict% <error-content>的区域重叠"
  area-add-not-enough-money: "<error-primary>错误: <error-content>金币不足，追加该区域需要 <error-highlight>%price%"
  area-add-unavailable: "<error-primary>错误: <error-content>当前选区不能追加为区域"
  area-add-success: "<content>已向领地 <highlight>%claim% <content>追加区域，大小 <highlight>%size% <content>方块，花费 <highlight>%price%"
  area-add-subclaim-success: "<content>已向子领地 <highlight>%claim% <content>追加区域，大小 <highlight>%size% <content>方块"
  area-remove-no-area: "<error-primary>错误: <error-content>当前位置没有可删除的区域"
  area-remove-last-area: "<error-primary>错误: <error-content>不能删除领地的最后一个区域，请使用 <error-highlight>/res remove <error-content>删除整个领地"
  area-remove-has-subclaim: "<error-primary>错误: <error-content>该区域包含子领地，不能删除，请先处理子领地"
  area-remove-no-pending: "<error-primary>错误: <error-content>没有待确认的区域删除操作，请先输入 <error-highlight>/res area remove"
  area-remove-expired: "<error-primary>错误: <error-content>区域删除确认已过期，请重新输入 <error-highlight>/res area remove"
  area-remove-success: "<content>已从领地 <highlight>%claim% <content>删除当前位置所在区域 <highlight>%area%"
  area-remove-confirm-message:
    - "<dark_gray>======== <error-highlight>删除区域确认 <dark_gray>========"
    - "<muted>领地: <highlight>%claim%"
    - "<muted>区域: <highlight>%area%"
    - "<error-content>此操作不可撤销。请在 <error-highlight>%seconds% <error-content>秒内确认。"
    - "%confirm%"
  area-remove-confirm-button: "<hover:show_text:'确认删除当前位置所在区域'><click:run_command:%command%><error-highlight>[确认删除区域]</click></hover>"
  area-list-message:
    - "<dark_gray>======== <highlight>%claim% <muted>- 区域列表 <dark_gray>========"
    - "<content>共 <highlight>%count% <content>个区域"
    - "%areas%"
  area-list-entry: "<muted>- <highlight>%area% <muted>| 大小 <highlight>%size%"
  area-list-empty: "<muted>无区域"

  info-message:
    - "<dark_gray>======== <highlight>%claim% <muted>- 领地信息 <dark_gray>========"
    - "<muted>所有者: <highlight>%owner%"
    - "<muted>父级路径: <highlight>%parent%"
    - "<muted>子领地: <highlight>%subclaim-count% <muted>个 <dark_gray>| <content>%subclaims%"
    - "<muted>你的权限组: <highlight>%group%"
    - "<muted>权限组: <hover:show_text:'%groups%'><highlight>%group-count% <muted>个</hover> <muted>| 成员: <hover:show_text:'%members%'><highlight>%member-count%</hover>"
    - "<hover:show_text:'输入信任玩家命令'><click:suggest_command:/res trust ><content>[添加玩家]</click></hover> <hover:show_text:'输入权限设置命令'><click:suggest_command:/res set ><content>[设置权限]</click></hover>"
  list-message:
    - "<dark_gray>======== <highlight>%player% <muted>的领地 <dark_gray>========"
    - "<content>共 <highlight>%count% <content>个领地"
  list-entry: "<muted>- <hover:show_text:'%hover%'><click:run_command:/res info %uuid%><highlight>%claim%</click></hover>"
  list-footer:
    - "第 <highlight>%page%<content>/<highlight>%page-count% <content>页"
    - "%prev% <muted>| %next%"

  format:
    no-areas: "无区域"
    area-summary: "%count% 个区域，首个 %area%"
    area-box: "(%min-x%, %min-y%, %min-z%) ~ (%max-x%, %max-y%, %max-z%)"
    group-entry: "%group% (%weight%)"
    no-members: "暂无成员"
    empty-value: "空"
    member-entry: "%player% -> %group%"
    no-subclaims: "无子领地"
    subclaim-entry: "<hover:show_text:'点击查看子领地'><click:run_command:/res info %uuid%><highlight>%claim%</click></hover>"
    previous-page: "上一页"
    next-page: "下一页"
    page-enabled: "<hover:show_text:'点击翻页'><click:run_command:%command%><highlight>%label%</click></hover>"
    page-disabled: "<dark_gray>%label%</dark_gray>"
    more-items: "... 还有 %count% 项"
    console: "控制台"
    none: "无"
    parent-link: "<hover:show_text:'点击查看父领地'><click:run_command:/res info %uuid%>%claim%</click></hover>"
    parent-path-entry: "<hover:show_text:'点击查看领地'><click:run_command:/res info %uuid%>%claim%</click></hover>"
    list-entry-hover: "点击查看详情"

claim:
  prohibited-action: "<error-highlight>%group-name% <error-content>没有权限 %permission%"
