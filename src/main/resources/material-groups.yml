all: # An entry with the key `all` must exist.
  name: "material-group.all" # A translation key should be placed here
  priority: 1 # This is low because it is very broad.
  materials: # You are not suggested to edit this.
    - ".*"

container:
  name: "material-group.container" # A translation key should be placed here
  priority: 2 # Should be a positive integer (Don't make it absurdly big). When conflicting, the group with the highest priority will take over.
  materials: # Not case-sensitive
    - "chest"
    - ".*_chest" # Regex supported
    - "chest_minecart"
    - ".*_chest_boat"